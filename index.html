<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Exam Platform</title>

<style>
body {font-family: Arial; background:#f5f6f8; margin:0;}
.header {background:#111827;color:white;padding:12px;text-align:center;}
.box {max-width:800px;margin:20px auto;background:white;padding:20px;border-radius:10px;}
.timer {text-align:center;font-size:20px;color:red;}
.option {padding:10px;margin:8px 0;background:#eee;border-radius:6px;cursor:pointer;}
.option:hover {background:#ddd;}
.selected {background:#2563eb;color:white;}
button {padding:10px;margin-top:10px;}
</style>

</head>

<body>

<div class="header">📘 Exam Platform</div>

<div class="box">

<div class="timer" id="timer">60:00</div>

<div id="status">Загрузка экзамена...</div>

<div id="exam" style="display:none;">
    <h3 id="q"></h3>
    <div id="opts"></div>

    <button onclick="prev()">⬅</button>
    <button onclick="next()">➡</button>
    <button onclick="finish()">Завершить</button>
</div>

<div id="result"></div>

</div>

<script>

let q = [];
let i = 0;
let ans = {};
let t = 60*60;

// 📡 LOAD
fetch("https://exam-platform-dmv5.onrender.com/test")
.then(r => r.json())
.then(data => {

    if (!Array.isArray(data) || data.length === 0) {
        document.getElementById("status").innerText = "Нет вопросов";
        return;
    }

    q = data.slice(0,30);

    document.getElementById("status").style.display="none";
    document.getElementById("exam").style.display="block";

    draw();
});

// ⏱ TIMER
setInterval(()=>{
    t--;
    let m=Math.floor(t/60);
    let s=t%60;
    document.getElementById("timer").innerText=`${m}:${s<10?"0":""}${s}`;
    if(t<=0) finish();
},1000);

// 📌 DRAW
function draw(){
    let x=q[i];

    document.getElementById("q").innerText=(i+1)+". "+x.question;

    let html="";
    x.options.forEach((o,n)=>{
        html+=`<div class="option ${ans[i]===n?'selected':''}"
        onclick="pick(${n})">${o}</div>`;
    });

    document.getElementById("opts").innerHTML=html;
}

function pick(n){ans[i]=n;draw();}
function prev(){if(i>0)i--;draw();}
function next(){if(i<q.length-1)i++;draw();}

// 📊 RESULT
function finish(){
    let score=0;

    q.forEach((x,idx)=>{
        if(ans[idx]===x.correct)score++;
    });

    document.getElementById("exam").style.display="none";

    document.getElementById("result").innerHTML=
    `🎉 Результат:<br><br>${score}/${q.length}<br>${Math.round(score/q.length*100)}%`;
}

</script>

</body>
</html>
