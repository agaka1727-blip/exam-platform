<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Exam Platform</title>
</head>

<body>

<!-- ⏱ ТАЙМЕР (В САМОМ ВЕРХУ) -->
<div id="timer" style="font-size:20px; font-weight:bold;">
    60:00
</div>

<hr>

<!-- 🧪 ВОПРОСЫ (пример) -->
<h3>Вопрос 1: 2 + 2 = ?</h3>

<button onclick="checkAnswer(true)">4</button>
<button onclick="checkAnswer(false)">3</button>
<button onclick="checkAnswer(false)">5</button>

<hr>

<!-- 🧾 КНОПКА ЗАВЕРШЕНИЯ -->
<button onclick="submitTest()" style="padding:10px 20px; font-size:16px;">
    Завершить тест
</button>

<!-- 📜 JAVASCRIPT -->
<script>

let time = 60 * 60; // 60 минут
let score = 0;
let total = 0;

// ⏱ таймер
let timer = setInterval(() => {

    time--;

    let min = Math.floor(time / 60);
    let sec = time % 60;

    document.getElementById("timer").innerText =
        `${min}:${sec < 10 ? "0" : ""}${sec}`;

    if (time <= 0) {
        clearInterval(timer);
        submitTest();
    }

}, 1000);


// ✔ проверка ответа
function checkAnswer(isCorrect) {
    total++;

    if (isCorrect) {
        score++;
    }
}


// 📤 отправка результата
function submitTest() {

    clearInterval(timer);

    fetch("/submit", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            score: score,
            total: total
        })
    })
    .then(res => res.json())
    .then(data => {
        alert("Тест завершён! Результат: " + score + "/" + total);
        console.log(data);
    });

}

</script>

</body>
</html>
