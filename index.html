<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Exam Platform</title>
    <style>
        body {
            font-family: Arial;
            max-width: 900px;
            margin: 30px auto;
        }

        .box {
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
        }

        .question {
            margin-top: 20px;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .option {
            display: block;
            margin: 5px 0;
        }
    </style>
</head>
<body>

<h1>📘 Exam Platform</h1>

<div class="box">
    <h3>📤 Загрузка DOCX</h3>
    <input type="file" id="file">
    <button onclick="upload()">Загрузить</button>
</div>

<div class="box">
    <h3>📋 Тест</h3>
    <button onclick="loadTest()">Показать тест</button>
    <div id="test"></div>
</div>

<script>
const API = "https://exam-platform-dmv5.onrender.com";

async function upload() {
    const file = document.getElementById("file").files[0];
    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch(API + "/upload", {
        method: "POST",
        body: formData
    });

    const data = await res.json();
    alert("Загружено вопросов: " + data.questions);
}

async function loadTest() {
    const res = await fetch(API + "/test");
    const data = await res.json();

    const container = document.getElementById("test");
    container.innerHTML = "";

    data.forEach((q, i) => {
        let html = `<div class="question">
            <b>${i+1}. ${q.question}</b><br>`;

        q.options.forEach(o => {
            html += `
                <label class="option">
                    <input type="radio" name="q${i}">
                    ${o.text}
                </label>
            `;
        });

        html += "</div>";
        container.innerHTML += html;
    });
}
</script>

</body>
</html>
