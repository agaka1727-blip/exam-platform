<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Exam Platform</title>
</head>

<body>

<h2>📘 Exam Platform</h2>

<div id="timer">Загрузка...</div>

<hr>

<div id="app">Загрузка экзамена...</div>

<script>

let questions = [];
let index = 0;
let score = 0;
let timer = 60 * 60;

const API = "https://exam-platform-dmv5.onrender.com/test";

fetch(API)
.then(r => r.json())
.then(data => {

    questions = data;

    if (!questions.length) {
        document.getElementById("app").innerHTML = "❌ Нет вопросов";
        return;
    }

    render();
    startTimer();
});

function render() {

    const q = questions[index];

    let html = `
        <h3>Вопрос ${index + 1}</h3>
        <p>${q.question}</p>
    `;

    q.options.forEach((opt, i) => {
        html += `
            <button onclick="answer(${i})">
                ${opt}
            </button>
            <br><br>
        `;
    });

    html += `
        <hr>
        <button onclick="prev()">⬅ Назад</button>
        <button onclick="next()">Вперёд ➡</button>
        <button onclick="finish()">Завершить</button>
    `;

    document.getElementById("app").innerHTML = html;
}

function answer(i) {
    if (i === questions[index].correct) {
        score++;
    }
}

function next() {
    if (index < questions.length - 1) {
        index++;
        render();
    }
}

function prev() {
    if (index > 0) {
        index--;
        render();
    }
}

function finish() {
    alert("Результат: " + score + " / " + questions.length);
}

function startTimer() {

    setInterval(() => {

        timer--;

        let m = Math.floor(timer / 60);
        let s = timer % 60;

        document.getElementById("timer").innerText =
            m + ":" + (s < 10 ? "0" : "") + s;

        if (timer <= 0) {
            finish();
        }

    }, 1000);
}

</script>

</body>
</html>
