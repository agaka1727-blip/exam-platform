<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Exam Platform</title>

<style>
body { font-family: Arial; margin: 20px; }
#top { display:flex; justify-content:space-between; align-items:center; }
button { margin:5px; padding:10px; }
.question-box { margin-top:20px; padding:15px; border:1px solid #ccc; }
.nav { margin-top:20px; }
</style>
</head>

<body>

<div id="top">
    <div id="timer">60:00</div>
    <div id="progress">0 / 30</div>
</div>

<hr>

<div id="app">Загрузка экзамена...</div>

<script>

const API = "https://exam-platform-dmv5.onrender.com/test";

let questions = [];
let selected = [];
let current = 0;
let answers = {};
let time = 60 * 60;
let timerStarted = false;

/* ⏱ TIMER */
function startTimer() {
    if (timerStarted) return;
    timerStarted = true;

    setInterval(() => {
        time--;

        let m = Math.floor(time / 60);
        let s = time % 60;

        document.getElementById("timer").innerText =
            `${m}:${s < 10 ? "0" : ""}${s}`;

        if (time <= 0) submitExam();

    }, 1000);
}

/* 📡 LOAD QUESTIONS */
async function loadQuestions() {
    const res = await fetch(API);
    questions = await res.json();

    // 🎲 shuffle + pick 30
    questions = questions.sort(() => Math.random() - 0.5);
    selected = questions.slice(0, 30);

    render();
}

/* 📄 RENDER QUESTION */
function render() {
    const q = selected[current];

    document.getElementById("progress").innerText =
        `${current + 1} / ${selected.length}`;

    let html = `
        <div class="question-box">
            <h3>${q.question}</h3>
            <div>
    `;

    q.options.forEach((opt, i) => {
        html += `
            <button onclick="selectAnswer(${i})"
            style="background:${answers[current] === i ? '#ddd' : ''}">
                ${opt}
            </button><br>
        `;
    });

    html += `
            </div>
        </div>

        <div class="nav">
            <button onclick="prev()">⬅ Назад</button>
            <button onclick="next()">Далее ➡</button>
            <button onclick="submitExam()">🏁 Завершить</button>
        </div>
    `;

    document.getElementById("app").innerHTML = html;

    startTimer();
}

/* ✔ ANSWER */
function selectAnswer(i) {
    answers[current] = i;
    render();
}

/* ➡ NAV */
function next() {
    if (current < selected.length - 1) {
        current++;
        render();
    }
}

function prev() {
    if (current > 0) {
        current--;
        render();
    }
}

/* 🏁 RESULT */
function submitExam() {
    let score = 0;

    selected.forEach((q, i) => {
        if (answers[i] === q.correct) {
            score++;
        }
    });

    document.getElementById("app").innerHTML = `
        <h2>Результат</h2>
        <p>Правильных: ${score} / ${selected.length}</p>
        <p>Процент: ${Math.round(score / selected.length * 100)}%</p>
    `;
}

loadQuestions();

</script>

</body>
</html>
